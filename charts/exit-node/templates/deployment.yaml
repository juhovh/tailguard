apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "exit-node.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "exit-node.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "exit-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "exit-node.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "exit-node.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-copy-wg0
          image: busybox:1.35
          command: ['sh', '-c', 'cp /tmp/wg0.conf /etc/wireguard/wg0.conf','&&', 'sleep', '120']
          volumeMounts:
            - name: configDir
              mountPath: /etc/wireguard
            - name: config
              mountPath: /tmp
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: TG_CLIENT_MODE
              value: "0"
            - name: TG_EXPOSE_HOST
              value: "0"
            - name: TS_ROUTES
              value: "0.0.0.0/0,::/0"
          {{- with .Values.tailscale.hostName | default (.Release.Name) }}
            - name: TS_HOSTNAME
              value: {{ . | b64enc  }}
          {{- end }}
          {{- with .Values.tailguard.nameServers }}
            - name: TG_NAMESERVERS
              value: {{ . | quote }}
          {{- end }}
          {{- if .Values.tailguard.webui.enable }}
            - name: TG_WEBUI_PORT
              value: {{ (.Values.tailguard.webui.service).port | default 8080 | quote }}
          {{- end}}
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "exit-node.fullname" . }}
          {{- if .Values.tailguard.webui.enabled }}
          ports:
            - name: http
              containerPort: {{ (.Values.tailguard.webui.service).port | default 8080 | quote }}
              protocol: TCP
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if eq .Values.tailscale.state.type "PersistentVolumeClaim" }}
            - name: state
              mountPath: /tailguard/state
            {{- end }}
            - name: configDir
              mountPath: /etc/wireguard
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        {{- if eq .Values.tailscale.state.type "PersistentVolumeClaim" }}
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "exit-node.tailscale.state.name" . }}
        {{- end }}
        - name: config
          secret:
            secretName: {{ include "exit-node.fullname" . }}
        - name: configDir
          emptyDir:
            sizeLimit: 1Mi
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
