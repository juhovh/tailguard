{{- if or (.Values.serviceAccount).enabled ( eq .Values.tailscale.state.type "Secret") -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "exit-node.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "exit-node.labels" . | nindent 4 }}
{{- end}}
{{- if eq .Values.tailscale.state.type "Secret" }}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "exit-node.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "exit-node.labels" . | nindent 4 }}
rules:
  - apiGroups: [""] # "" indicates the core API group
    resources: ["secrets"]
    # Create can not be restricted to a resource name.
    verbs: ["create"]
  - apiGroups: [""] # "" indicates the core API group
    resourceNames: 
     - {{ include "exit-node.tailscale.state.name" . | quote }}
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""] # "" indicates the core API group
    resources: ["events"]
    verbs: ["get", "create", "patch"]
--- 
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "exit-node.fullname" . }}
  labels:
    {{- include "exit-node.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "exit-node.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "exit-node.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
